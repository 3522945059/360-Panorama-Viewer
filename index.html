<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>360 全景图浏览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div id="viewer" class="viewer" aria-label="360 全景图查看器"></div>

      <div class="hud">
        <div class="brand">
          <span class="brand-kicker">Panorama</span>
          <h1>360 全景浏览</h1>
        </div>

        <div class="status-stack">
          <div id="status" class="status">正在初始化查看器...</div>

          <div class="picker-row">
            <label class="picker" for="panoramaSelect">
              <span class="picker-label">当前全景图</span>
              <select id="panoramaSelect" class="picker-select" disabled></select>
            </label>

            <label class="ghost-button file-button" for="replaceImageInput">
              更换当前图片
            </label>
            <input
              id="replaceImageInput"
              class="hidden-input"
              type="file"
              accept="image/png,image/jpeg,image/webp"
            />
          </div>
        </div>

        <div class="controls">
          <button id="fullscreenButton" class="ghost-button" type="button">
            全屏
          </button>
        </div>
      </div>

      <div id="emptyState" class="empty-state hidden" role="status">
        <div class="empty-card">
          <p class="empty-eyebrow">未检测到可用全景图</p>
          <h2>请先准备全景图资源</h2>
          <p>
            你可以直接点击“更换当前图片”，在前端页面里立即替换 360 全景图。
          </p>
        </div>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
